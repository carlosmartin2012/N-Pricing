name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Seed/schema sync check
        run: npm run check:sync

      - name: Seed and config data quality
        run: npm run check:data-quality

      - name: Dependency security audit
        run: npm run check:security

      - name: Run tests with coverage gate
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: npx vite build

      - name: Check bundle size budgets
        run: npm run check:bundle

      - name: Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true

      - name: Install Playwright (E2E)
        run: npx playwright install --with-deps chromium
        if: github.event_name == 'pull_request'

      - name: Run E2E tests
        run: npx playwright test
        if: github.event_name == 'pull_request'

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: npricing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      INTEGRATION_DATABASE_URL: postgres://postgres:pw@localhost:5432/npricing_test
      PGPASSWORD: pw

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then exit 0; fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          exit 1

      - name: Apply migrations in order
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ applying $f"
            psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run integration tests
        run: npx vitest run utils/__tests__/integration
