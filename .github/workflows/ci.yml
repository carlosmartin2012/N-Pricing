name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (zero warnings)
        # `npm run lint` ahora usa --max-warnings=0 (package.json), así
        # que cualquier warning nuevo (unused import, exhaustive-deps,
        # etc.) bloquea el merge. Baseline cerrado en PR #108.
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Seed/schema sync check
        run: npm run check:sync

      - name: Seed and config data quality
        run: npm run check:data-quality

      - name: Dependency security audit
        run: npm run check:security

      - name: Run tests with coverage gate
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: npx vite build

      - name: Check bundle size budgets
        run: npm run check:bundle

      - name: Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true

      - name: Install Playwright (E2E)
        run: npx playwright install --with-deps chromium
        if: github.event_name == 'pull_request'

      - name: Run E2E tests
        run: npx playwright test
        if: github.event_name == 'pull_request'

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: npricing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      INTEGRATION_DATABASE_URL: postgres://postgres:pw@localhost:5432/npricing_test
      PGPASSWORD: pw

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then exit 0; fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          exit 1

      - name: Bootstrap Supabase-specific objects (CI only)
        # Supabase-hosted Postgres provisions objects our migrations take for
        # granted — a raw postgres:16 container has none of them. This step
        # creates a minimal compatible environment so the migration loop runs
        # end-to-end. All statements are idempotent (IF NOT EXISTS / OR REPLACE).
        #
        # Covered:
        #   - `supabase_realtime` publication          (ALTER PUBLICATION ADD TABLE)
        #   - `anon` / `authenticated` / `service_role` roles  (GRANT ... TO)
        #   - `auth` schema + stub `jwt()`/`uid()`/`users` table
        #       → required for CREATE POLICY to parse schema-qualified calls
        #         like `auth.jwt()->>'email'`. Policies evaluate expressions
        #         only at row-access time, but the schema + object names must
        #         resolve at CREATE. The stubs return empty/null so policies
        #         never match at runtime; integration tests use pg.Pool with
        #         the DB owner (bypasses RLS), so no coverage is lost.
        #
        # No GitHub event data is used — only the DB URL from env above.
        run: |
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'supabase_realtime') THEN
              CREATE PUBLICATION supabase_realtime;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN NOINHERIT;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN NOINHERIT;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN NOINHERIT BYPASSRLS;
            END IF;
          END
          $$;

          CREATE SCHEMA IF NOT EXISTS auth;

          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS JSONB
            LANGUAGE sql STABLE AS $$ SELECT '{}'::jsonb $$;

          CREATE OR REPLACE FUNCTION auth.uid() RETURNS UUID
            LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;

          CREATE TABLE IF NOT EXISTS auth.users (
            id    UUID PRIMARY KEY,
            email TEXT
          );
          SQL

      - name: Apply migrations in order
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ applying $f"
            psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run integration tests
        run: npx vitest run utils/__tests__/integration
