openapi: 3.0.3
info:
  title: N-Pricing API
  description: |
    Bank-grade pricing platform — FTP engine, customer relationships,
    channel quotes, governance dossiers, observability and tenant ops.

    Three families of endpoints:
      1. Pricing Edge Functions (Supabase) — POST /pricing, /pricing/batch,
         /pricing/scenarios. Write pricing_snapshots on every call.
      2. Express server (/api/*) — entity-scoped CRUD + read endpoints behind
         x-entity-id tenancy middleware and JWT auth.
      3. Channel API (/api/channel/*) — API-key authenticated, rate limited
         per key, separate from the JWT path.

    Refer to docs/phase-0-rollout.md for the env vars that gate strict
    tenancy enforcement and mock-fallback rejection.
  version: 2.0.0
  contact:
    name: N-Pricing Team

servers:
  - url: https://{project-ref}.supabase.co/functions/v1
    description: Supabase Edge Functions
  - url: https://{deployment}/api
    description: Express server

security:
  - bearerAuth: []

tags:
  - name: pricing
  - name: snapshots
  - name: customer360
  - name: campaigns
  - name: channel
  - name: governance
  - name: observability
  - name: metering
  - name: auth

paths:
  /pricing:
    post:
      tags: [pricing]
      summary: Price a single deal
      description: |
        Calculate FTP for a single transaction. Persists a pricing_snapshots
        row with input + context + output + sha256 hashes. Returns
        x-snapshot-id and x-engine-version response headers.
      operationId: priceSingleDeal
      parameters:
        - in: header
          name: x-entity-id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: x-request-id
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricingRequest'
      responses:
        '200':
          description: Pricing result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FTPResult'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /pricing/batch:
    post:
      summary: Price multiple deals
      description: Batch pricing for portfolio repricing
      operationId: priceBatchDeals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchPricingRequest'
      responses:
        '200':
          description: Batch pricing results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchPricingResponse'

  /snapshots/{id}:
    get:
      tags: [snapshots]
      summary: Fetch a pricing snapshot
      description: Returns the full input + context + output payload + hashes.
      operationId: getPricingSnapshot
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Snapshot found }
        '404': { description: Not found }

  /snapshots/{id}/replay:
    post:
      tags: [snapshots]
      summary: Replay a pricing snapshot
      description: |
        Re-executes the pricing engine against the stored input + context.
        Returns matches=true when output is byte-identical to the stored
        version; otherwise diff[] reports the field-level deltas
        (deltaAbs + deltaBps for known FTPResult numeric fields).
      operationId: replaySnapshot
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Replay verdict
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshotId:           { type: string }
                  matches:              { type: boolean }
                  engineVersionOriginal:{ type: string }
                  engineVersionNow:     { type: string }
                  diff:                 { type: array }

  /snapshots/verify-chain:
    get:
      tags: [snapshots]
      summary: Verify the snapshot hash chain for the caller's entity
      description: |
        Admin-only. Walks pricing_snapshots for the caller's entity
        (oldest→newest) in an optional date window and checks that each
        non-first row's prev_output_hash matches the previous row's
        output_hash. Detects tampering of historical snapshots as
        valid=false with brokenAt pointing at the first mismatch.

        Concurrency invariant: the partial UNIQUE index
        (entity_id, prev_output_hash) WHERE prev_output_hash IS NOT NULL
        prevents two concurrent pricing calls from forking the chain
        by claiming the same predecessor. The Edge writer retries on
        conflict 23505 with exponential backoff (10/40/160ms, 3 retries).

        Genesis semantics: the first snapshot per tenant has
        prev_output_hash = NULL. When the caller passes a partial window,
        the first row in the result is accepted (its prev references a
        hash outside the window — that's expected, not a break).
      operationId: verifySnapshotChain
      parameters:
        - { in: query, name: from, required: false, schema: { type: string, format: date-time },
            description: "ISO-8601 UTC lower bound (inclusive)" }
        - { in: query, name: to,   required: false, schema: { type: string, format: date-time },
            description: "ISO-8601 UTC upper bound (inclusive)" }
      responses:
        '200':
          description: Chain verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  entityId: { type: string, format: uuid }
                  from:     { type: string, nullable: true }
                  to:       { type: string, nullable: true }
                  count:    { type: integer, description: "number of snapshots in the window" }
                  valid:    { type: boolean }
                  checked:  { type: integer, description: "number of links actually compared" }
                  brokenAt:
                    type: object
                    nullable: true
                    properties:
                      snapshotId:   { type: string, format: uuid }
                      expectedPrev: { type: string }
                      actualPrev:   { type: string, nullable: true }
        '403': { description: "Admin role required" }

  /customer360/clients/{clientId}:
    get:
      tags: [customer360]
      summary: Aggregated client relationship view
      description: |
        Returns ClientRelationship: client + positions + metrics history +
        applicable pricing targets + derived totals (active position count,
        total exposure, productTypesHeld, isMultiProduct, relationshipAgeYears).
      operationId: getClientRelationship
      parameters:
        - { in: path, name: clientId, required: true, schema: { type: string } }
        - { in: query, name: as_of, required: false, schema: { type: string, format: date } }

  /customer360/clients/{clientId}/positions:
    get:
      tags: [customer360]
      summary: List positions for a client
      operationId: listClientPositions
    post:
      tags: [customer360]
      summary: Create a new position
      operationId: createClientPosition

  /customer360/clients/{clientId}/metrics:
    get:
      tags: [customer360]
      summary: List metrics snapshots for a client
      operationId: listClientMetrics
    post:
      tags: [customer360]
      summary: Append a metrics snapshot
      operationId: createClientMetricsSnapshot

  /customer360/import/positions:
    post:
      tags: [customer360]
      summary: Bulk CSV import of positions
      description: |
        Accepts text/csv body or { csv } JSON body. Single transaction with
        chunked inserts; full rollback on any failure. Returns inserted count
        + skipped + per-row errors.
      operationId: importPositionsCsv
      requestBody:
        required: true
        content:
          text/csv:
            schema: { type: string }

  /customer360/import/metrics:
    post:
      tags: [customer360]
      summary: Bulk CSV import of metrics snapshots
      operationId: importMetricsCsv

  /customer360/pricing-targets:
    get:
      tags: [customer360]
      summary: List active pricing targets
      operationId: listPricingTargets
      parameters:
        - { in: query, name: period, required: false, schema: { type: string } }
        - { in: query, name: segment, required: false, schema: { type: string } }
    post:
      tags: [customer360]
      summary: Author a top-down pricing target
      operationId: createPricingTarget

  /campaigns:
    get:
      tags: [campaigns]
      summary: List pricing campaigns
      operationId: listCampaigns
      parameters:
        - { in: query, name: status, required: false, schema: { type: string, enum: [draft, approved, active, exhausted, expired, cancelled] } }
    post:
      tags: [campaigns]
      summary: Create a draft campaign
      operationId: createCampaign

  /campaigns/{id}/status:
    patch:
      tags: [campaigns]
      summary: Transition campaign status
      description: 'state machine: draft → approved → active → exhausted | expired | cancelled'
      operationId: transitionCampaignStatus

  /channel/quote:
    post:
      tags: [channel]
      summary: Real-time channel pricing quote
      description: |
        Auth via x-channel-key (sha256 lookup against channel_api_keys).
        Token-bucket rate limit per key. Applies the best matching active
        campaign delta to the engine output. Persists a row to
        channel_request_log.
      operationId: channelQuote
      security: []
      parameters:
        - { in: header, name: x-channel-key, required: true, schema: { type: string } }
      responses:
        '200': { description: Quote with optional campaign delta }
        '401': { description: Missing or invalid channel key }
        '429': { description: Rate limit exceeded — Retry-After header set }

  /governance/models:
    get:
      tags: [governance]
      summary: List models in the inventory (SR 11-7 / EBA)
      operationId: listModels
    post:
      tags: [governance]
      summary: Add a model to the inventory
      operationId: createModel

  /governance/models/{id}/status:
    patch:
      tags: [governance]
      summary: Transition model status (candidate → active → retired | rejected)
      operationId: transitionModelStatus

  /governance/dossiers:
    post:
      tags: [governance]
      summary: Sign a committee dossier
      description: |
        Computes payload_hash = sha256(canonicalJson(payload)),
        signature_hex = HMAC-SHA256(payload_hash, DOSSIER_SIGNING_SECRET).
        Append-only — RLS forbids UPDATE / DELETE.
      operationId: signDossier

  /governance/dossiers/{id}/verify:
    post:
      tags: [governance]
      summary: Verify a stored dossier signature
      description: |
        Recomputes the hash and HMAC and compares constant-time. Reports
        payloadHashMatches and signatureMatches separately so callers can
        distinguish payload tampering from signature forgery.
      operationId: verifyDossier

  /observability/summary:
    get:
      tags: [observability]
      summary: Health summary (legacy — kept for backwards compatibility)
      operationId: getHealthSummary

  /observability/slo-summary:
    get:
      tags: [observability]
      summary: SLO snapshot per entity
      description: |
        Returns per-SLI cards with target, current, status (ok/warning/breached)
        and percentiles where applicable. Active alerts list included.
      operationId: getSLOSummary
      parameters:
        - { in: query, name: window, required: false, schema: { type: string, enum: [1h, 24h, 7d, 30d], default: 1h } }

  /observability/tenancy-violations:
    get:
      tags: [observability]
      summary: Tenancy violations canary (window + top-endpoints)
      description: |
        Returns the total and top-10 (endpoint, error_code) breakdown of
        tenancy_violations for the caller's entity over the requested
        window (default 60 min, clamped to [1, 1440]).

        Feeds the SLOPanel widget "Tenancy violations · last 60m" used
        during the 48h observation window before flipping
        TENANCY_STRICT=on (see docs/runbooks/tenancy-strict-flip.md).

        Same entity-scoping predicate as slo-summary: a tenant sees both
        "I claimed the wrong entity" and "someone else claimed mine".
      operationId: getTenancyViolations
      parameters:
        - { in: query, name: entity_id,       required: false, schema: { type: string, format: uuid } }
        - { in: query, name: window_minutes,  required: false, schema: { type: integer, minimum: 1, maximum: 1440, default: 60 } }
      responses:
        '200':
          description: Violation breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  entityId:      { type: string, format: uuid }
                  windowMinutes: { type: integer }
                  since:         { type: string, format: date-time }
                  total:         { type: integer, description: "total violations in the window" }
                  topEndpoints:
                    type: array
                    maxItems: 10
                    items:
                      type: object
                      properties:
                        endpoint:  { type: string }
                        errorCode: { type: string }
                        count:     { type: integer }

  /metering/usage:
    get:
      tags: [metering]
      summary: Per-day usage aggregates for a period (operational only — no billing)
      operationId: getUsage
      parameters:
        - { in: query, name: period_start, required: true, schema: { type: string, format: date } }
        - { in: query, name: period_end,   required: true, schema: { type: string, format: date } }

  /metering/feature-flags:
    get:
      tags: [metering]
      summary: Tenant feature flags (kill switch, channel_api_enabled, etc.)
      operationId: getFeatureFlags

  /auth/google:
    post:
      tags: [auth]
      summary: Sign in with Google (verifies ID token, returns JWT)
      description: |
        Validates the Google ID token via OAuth2Client + GoogleSsoProvider,
        resolves the caller's primary entity_users membership, returns a
        JWT plus primaryEntityId so the SPA can pre-fill x-entity-id.
      operationId: signInWithGoogle
      security: []

  /auth/me:
    get:
      tags: [auth]
      summary: Self-introspection (entity memberships)
      operationId: whoAmI

  /pricing/scenarios:
    post:
      summary: Compare pricing scenarios
      description: Price a deal under multiple shock scenarios
      operationId: compareScenarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioRequest'
      responses:
        '200':
          description: Scenario comparison
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PricingRequest:
      type: object
      required: [deal, approvalMatrix]
      properties:
        deal:
          $ref: '#/components/schemas/Transaction'
        approvalMatrix:
          $ref: '#/components/schemas/ApprovalMatrix'
        shocks:
          $ref: '#/components/schemas/PricingShocks'

    BatchPricingRequest:
      type: object
      required: [deals, approvalMatrix]
      properties:
        deals:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
          maxItems: 10000
        approvalMatrix:
          $ref: '#/components/schemas/ApprovalMatrix'
        shocks:
          $ref: '#/components/schemas/PricingShocks'

    BatchPricingResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              dealId:
                type: string
              result:
                $ref: '#/components/schemas/FTPResult'
        count:
          type: integer

    ScenarioRequest:
      type: object
      required: [deal, approvalMatrix, scenarios]
      properties:
        deal:
          $ref: '#/components/schemas/Transaction'
        approvalMatrix:
          $ref: '#/components/schemas/ApprovalMatrix'
        scenarios:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              shocks:
                $ref: '#/components/schemas/PricingShocks'
              overrides:
                type: object

    ScenarioResponse:
      type: object
      properties:
        scenarios:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              result:
                $ref: '#/components/schemas/FTPResult'
              deltaVsBase:
                type: object

    Transaction:
      type: object
      required: [clientId, productType, category, currency, amount, durationMonths]
      properties:
        id:
          type: string
        clientId:
          type: string
        clientType:
          type: string
          enum: [Corporate, Retail, SME, Institution, Gov]
        productType:
          type: string
        category:
          type: string
          enum: [Asset, Liability, Off-Balance]
        currency:
          type: string
        amount:
          type: number
          minimum: 0
        durationMonths:
          type: integer
          minimum: 1
          maximum: 360
        marginTarget:
          type: number
        riskWeight:
          type: number
        capitalRatio:
          type: number
        targetROE:
          type: number
        transitionRisk:
          type: string
          enum: [Brown, Amber, Neutral, Green]
        physicalRisk:
          type: string
          enum: [High, Medium, Low]

    ApprovalMatrix:
      type: object
      properties:
        autoApprovalThreshold:
          type: number
        l1Threshold:
          type: number
        l2Threshold:
          type: number

    PricingShocks:
      type: object
      properties:
        interestRate:
          type: number
          description: Basis points shock to interest rates
        liquiditySpread:
          type: number
          description: Basis points shock to liquidity spreads

    FTPResult:
      type: object
      properties:
        baseRate:
          type: number
        liquiditySpread:
          type: number
        regulatoryCost:
          type: number
        capitalCharge:
          type: number
        totalFTP:
          type: number
        finalClientRate:
          type: number
        raroc:
          type: number
        economicProfit:
          type: number
        approvalLevel:
          type: string
          enum: [Auto, L1_Manager, L2_Committee, Rejected]
        matchedMethodology:
          type: string

# -----------------------------------------------------------------------------
# CLV + 360º temporal (Phase 6)
# -----------------------------------------------------------------------------
# Every endpoint below is entity-scoped via `x-entity-id` + JWT. Snapshots
# are immutable (write-only via RLS); NBA rows are append + soft-consume.
paths:
  /clv/clients/{clientId}/timeline:
    get:
      summary: List timeline events for a client
      tags: [CLV]
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: Chronological (desc) list of events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClientEvent' }
        '400': { description: Tenancy header missing }
    post:
      summary: Append a client event (manual)
      tags: [CLV]
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientEvent' }
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientEvent' }

  /clv/clients/{clientId}/ltv:
    get:
      summary: List CLV snapshots for a client (history)
      tags: [CLV]
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Snapshots ordered by as_of_date desc
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClientLtvSnapshot' }

  /clv/clients/{clientId}/ltv/recompute:
    post:
      summary: Recompute CLV snapshot for a client (idempotent per as_of_date)
      tags: [CLV]
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                asOfDate: { type: string, format: date }
                horizonYears: { type: integer, minimum: 1, maximum: 30 }
                discountRate: { type: number }
                churnHazardAnnual: { type: number }
                renewalProb: { type: number }
      responses:
        '201':
          description: Snapshot (fresh or refreshed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientLtvSnapshot' }

  /clv/clients/{clientId}/nba:
    get:
      summary: List open Next-Best-Action recommendations for a client
      tags: [CLV]
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
        - name: open
          in: query
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Recommendations ordered by generated_at desc
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NbaRecommendation' }

  /clv/clients/{clientId}/nba/generate:
    post:
      summary: Run engine and persist top-N NBA candidates for a client
      tags: [CLV]
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                topN: { type: integer, minimum: 1, maximum: 10, default: 3 }
      responses:
        '201':
          description: Newly generated NBA rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NbaRecommendation' }

  /clv/nba/{id}/consume:
    patch:
      summary: Mark a recommendation as consumed
      tags: [CLV]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated recommendation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NbaRecommendation' }
        '404':
          description: Not found or already consumed

  /clv/preview-ltv-impact:
    post:
      summary: Preview the marginal ΔCLV of a deal candidate (does NOT persist)
      description: |
        Killer demo endpoint. Given a client and a deal candidate (product,
        amount, margin, tenor, capital), returns before/after CLV plus a
        decomposition (NII + crosssell + churn reduction + capital opp.).
        Pure function server-side — no DB mutation, safe to call on every
        rate tweak (debounced upstream ~400ms).
      tags: [CLV]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, candidate]
              properties:
                clientId: { type: string }
                asOfDate: { type: string, format: date }
                candidate:
                  type: object
                  required: [productType, amountEur, marginBps]
                  properties:
                    productType: { type: string }
                    currency: { type: string, default: EUR }
                    amountEur: { type: number }
                    tenorYears: { type: number }
                    rateBps: { type: number }
                    marginBps: { type: number }
                    capitalEur: { type: number }
                    rarocAnnual: { type: number }
                assumptions:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Before/after CLV + decomposition
          content:
            application/json:
              schema:
                type: object
                properties:
                  before:
                    type: object
                    properties:
                      clvPointEur: { type: number }
                      clvP5Eur:    { type: number }
                      clvP95Eur:   { type: number }
                  impact:
                    type: object
                    properties:
                      clvBeforeEur: { type: number }
                      clvAfterEur:  { type: number }
                      deltaClvEur:  { type: number }
                      deltaClvPct:  { type: number }
                      breakdown:
                        type: object
                        properties:
                          directNiiEur:           { type: number }
                          crosssellUpliftEur:     { type: number }
                          churnReductionEur:      { type: number }
                          capitalOpportunityEur:  { type: number }
                  assumptions:
                    type: object

components:
  schemas:
    ClientEvent:
      type: object
      properties:
        id:           { type: string, format: uuid }
        entityId:     { type: string, format: uuid }
        clientId:     { type: string }
        eventType:
          type: string
          enum: [onboarding, deal_booked, deal_cancelled, crosssell_attempt, crosssell_won, claim, churn_signal, contact, price_review, committee_review, nba_generated, nba_consumed]
        eventTs:      { type: string, format: date-time }
        source:
          type: string
          enum: [manual, pricing, crm, ops, ml, adapter]
        dealId:       { type: string, nullable: true, format: uuid }
        positionId:   { type: string, nullable: true, format: uuid }
        amountEur:    { type: number, nullable: true }
        payload:      { type: object, additionalProperties: true }

    ClientLtvSnapshot:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        entityId:             { type: string, format: uuid }
        clientId:             { type: string }
        asOfDate:             { type: string, format: date }
        horizonYears:         { type: integer }
        discountRate:         { type: number }
        clvPointEur:          { type: number }
        clvP5Eur:             { type: number, nullable: true }
        clvP95Eur:            { type: number, nullable: true }
        churnHazardAnnual:    { type: number, nullable: true }
        renewalProb:          { type: number, nullable: true }
        shareOfWalletEst:     { type: number, nullable: true }
        shareOfWalletGap:     { type: number, nullable: true }
        breakdown:            { type: object }
        assumptions:          { type: object }
        assumptionsHash:      { type: string, description: sha256 hex }
        engineVersion:        { type: string }
        computedAt:           { type: string, format: date-time }

    NbaRecommendation:
      type: object
      properties:
        id:                    { type: string, format: uuid }
        entityId:              { type: string, format: uuid }
        clientId:              { type: string }
        recommendedProduct:    { type: string }
        recommendedRateBps:    { type: number, nullable: true }
        recommendedVolumeEur:  { type: number, nullable: true }
        recommendedCurrency:   { type: string }
        expectedClvDeltaEur:   { type: number }
        confidence:            { type: number, minimum: 0, maximum: 1 }
        reasonCodes:
          type: array
          items:
            type: string
            enum: [share_of_wallet_low, renewal_window_open, nim_below_target, product_gap_core, cross_sell_cohort_signal, churn_signal_detected, price_above_market, capacity_underused, regulatory_incentive_available]
        rationale:             { type: string, nullable: true }
        source:
          type: string
          enum: [engine, ml, manual, crm]
        generatedAt:           { type: string, format: date-time }
        consumedAt:            { type: string, nullable: true, format: date-time }
        consumedBy:            { type: string, nullable: true }
